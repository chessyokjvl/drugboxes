<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Stock | รพ.จิตเวชเลยราชนครินทร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div id="page-login" class="page active">
        <div class="auth-card">
            <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="Logo" class="auth-logo">
            <h2 class="auth-title">Medication Stock</h2>
            <p class="auth-subtitle">ระบบติดตามกล่องและกระเป๋ายา Stock</p>
            <div class="form-group"><label>Username</label><input type="text" id="login-username" class="form-control"></div>
            <div class="form-group"><label>Password</label><input type="password" id="login-password" class="form-control"></div>
            <button class="btn-primary" onclick="app.login()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="page-dashboard" class="page">
        <nav class="navbar">
            <div class="nav-brand"><img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="Logo"> Life Saving Stock</div>
            <div>
                <span id="user-display"></span>
                <button class="btn-outline" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
            </div>
        </nav>
        <div class="header-action">
            <h2>ภาพรวมกล่องยา (Dashboard)</h2>
        </div>
        <div class="dashboard-grid" id="dashboard-container"></div>
    </div>

    <div id="page-box-detail" class="page">
        <nav class="navbar">
            <div class="nav-brand" onclick="app.navigate('page-dashboard')" style="cursor:pointer;"><i class="fas fa-arrow-left"></i> กลับไป Dashboard</div>
        </nav>
        <div class="header-action">
            <h2 id="detail-title">รายการยา</h2>
            <button class="btn-primary" id="btn-add-drug"><i class="fas fa-plus"></i> เพิ่มรายการ</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead><tr><th>ชื่อยา</th><th>Lot Number</th><th>วันหมดอายุ</th><th>จำนวน</th><th>อัปเดตล่าสุด</th><th>จัดการ</th></tr></thead>
                <tbody id="detail-tbody"></tbody>
            </table>
        </div>
    </div>
<div id="modal-drug" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="app.closeModal()">&times;</span>
            <h3 id="modal-title" style="color: var(--primary-green); margin-bottom: 20px;">จัดการรายการยา</h3>
            
            <input type="hidden" id="form-item-id">
            
            <div class="form-group">
                <label>ชื่อยา</label>
                <input type="text" id="form-drug-name" class="form-control" placeholder="เช่น Salbutamol Nebule">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Lot Number</label>
                    <input type="text" id="form-lot" class="form-control">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>จำนวน (Qty)</label>
                    <input type="number" id="form-qty" class="form-control">
                </div>
            </div>

            <div class="form-group">
                <label>วันหมดอายุที่ระบุข้างขวด/แผง</label>
                <input type="date" id="form-exp" class="form-control">
            </div>

            <div class="form-group special-condition">
                <label style="display: flex; align-items: center; cursor: pointer; color: var(--danger); font-weight: 500;">
                    <input type="checkbox" id="form-is-opened" style="margin-right: 10px; width: 18px; height: 18px;"> 
                    ⚠️ กรณีพิเศษ: แกะซอง/เปิดใช้แล้ว (ระบบจะปรับวันหมดอายุเป็น 3 เดือนนับจากวันนี้อัตโนมัติ)
                </label>
            </div>

            <div class="form-group">
                <label>เภสัชกรผู้ตรวจสอบ</label>
                <input type="text" id="form-verifier" class="form-control" placeholder="ชื่อเภสัชกรที่ตรวจสอบความถูกต้อง">
            </div>

            <button class="btn-primary" onclick="app.saveDrug()">บันทึกข้อมูล</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
